name: Scrape Nordic Fuel Prices

on:
  schedule:
    # Every 30 minutes (Sweden fastest source updates every 30 min)
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        env:
          FUELPRICES_DK_API_KEY: ${{ secrets.FUELPRICES_DK_API_KEY }}
        run: python src/main.py

      - name: Copy web files to data dir
        run: cp -r web/* data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: gh-pages
          force_orphan: false
