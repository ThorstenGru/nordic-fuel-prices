<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nordic Fuel Prices</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; height: 100vh; }

  header {
    padding: 12px 20px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
  #status { font-size: 0.75rem; color: #64748b; margin-left: auto; }
  #status.ok { color: #22c55e; }
  #status.err { color: #ef4444; }

  .controls {
    padding: 10px 20px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  select, button {
    background: #0f172a;
    color: #e2e8f0;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  button:hover { background: #1e3a5f; border-color: #3b82f6; }
  select:focus, button:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #map {
    flex: 1;
    min-width: 0;
  }

  #sidebar {
    width: 340px;
    flex-shrink: 0;
    overflow-y: auto;
    background: #1e293b;
    border-left: 1px solid #334155;
    padding: 12px;
  }

  #sidebar h2 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  .station-card {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .station-card:hover { border-color: #3b82f6; }
  .station-card.active { border-color: #3b82f6; background: #1e3a5f; }
  .station-name { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; }
  .station-meta { font-size: 0.72rem; color: #64748b; margin: 2px 0 6px; }
  .prices { display: flex; flex-wrap: wrap; gap: 5px; }
  .price-chip {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 0.75rem;
  }
  .price-chip .type { color: #94a3b8; }
  .price-chip .val { color: #22c55e; font-weight: 600; margin-left: 4px; }
  .price-chip .cur { color: #64748b; font-size: 0.68rem; margin-left: 2px; }

  .empty { color: #64748b; font-size: 0.85rem; padding: 20px 0; text-align: center; }

  .flag { font-size: 1.1rem; }

  @media (max-width: 640px) {
    #sidebar { display: none; }
  }
</style>
</head>
<body>

<header>
  <span class="flag">⛽</span>
  <h1>Nordic Fuel Prices</h1>
  <span id="status">Loading…</span>
</header>

<div class="controls">
  <select id="countryFilter">
    <option value="">All countries</option>
    <option value="SE">🇸🇪 Sweden</option>
    <option value="NO">🇳🇴 Norway</option>
    <option value="DK">🇩🇰 Denmark</option>
    <option value="FI">🇫🇮 Finland</option>
  </select>
  <select id="fuelFilter">
    <option value="">All fuel types</option>
    <option value="E10">E10 (95)</option>
    <option value="E5">E5 (98)</option>
    <option value="DIESEL">Diesel</option>
    <option value="LPG">LPG</option>
    <option value="HVO100">HVO100</option>
    <option value="AC_22KW">EV AC 22kW</option>
    <option value="DC_50KW">EV DC 50kW</option>
  </select>
  <button onclick="resetFilters()">Reset</button>
</div>

<div class="main">
  <div id="map"></div>
  <div id="sidebar">
    <h2>Stations <span id="countLabel"></span></h2>
    <div id="stationList"><p class="empty">Fetching data…</p></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { center: [62, 15], zoom: 4 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 18,
}).addTo(map);

const COUNTRY_FLAGS = { SE: '🇸🇪', NO: '🇳🇴', DK: '🇩🇰', FI: '🇫🇮' };
const UNIT_LABELS = { L: '/L', kWh: '/kWh', kg: '/kg' };

let allStations = [];
let markers = [];
let activeCard = null;
let markerMap = {};

async function loadData() {
  const status = document.getElementById('status');
  try {
    const resp = await fetch('all.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allStations = data.stations || [];

    const fetched = data.meta?.fetched_at
      ? new Date(data.meta.fetched_at).toLocaleString()
      : 'unknown';
    const withCoords = allStations.filter(s => s.lat && s.lon).length;
    status.textContent = `${allStations.length.toLocaleString()} stations (${withCoords} on map) · updated ${fetched}`;
    status.className = 'ok';

    render();
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
    status.className = 'err';
    document.getElementById('stationList').innerHTML = '<p class="empty">Could not load data.</p>';
  }
}

function getFilteredStations() {
  const country = document.getElementById('countryFilter').value;
  const fuel = document.getElementById('fuelFilter').value;
  return allStations.filter(s => {
    if (country && s.country !== country) return false;
    if (fuel && !s.prices?.some(p => p.fuel_type === fuel)) return false;
    return true;
  });
}

function render() {
  const stations = getFilteredStations();
  renderMarkers(stations);
  renderSidebar(stations);
}

function renderMarkers(stations) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  markerMap = {};

  stations.forEach((s, i) => {
    if (!s.lat || !s.lon) return;
    const color = confidenceColor(s.confidence);
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:2px solid #fff;opacity:0.85;"></div>`,
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });

    const marker = L.marker([s.lat, s.lon], { icon })
      .addTo(map)
      .bindPopup(buildPopup(s), { maxWidth: 280 });

    marker.on('click', () => selectStation(i));
    markers.push(marker);
    markerMap[i] = marker;
  });
}

function confidenceColor(c) {
  if (c >= 1.0) return '#22c55e';
  if (c >= 0.85) return '#3b82f6';
  if (c >= 0.70) return '#f59e0b';
  return '#ef4444';
}

function buildPopup(s) {
  const flag = COUNTRY_FLAGS[s.country] || '';
  let priceRows = (s.prices || []).map(p =>
    `<tr><td style="color:#94a3b8;padding-right:8px">${p.fuel_type}</td>` +
    `<td style="color:#22c55e;font-weight:600">${p.price.toFixed(2)}</td>` +
    `<td style="color:#64748b;padding-left:4px">${p.currency}${UNIT_LABELS[p.unit] || ''}</td></tr>`
  ).join('');
  return `<div style="font-family:system-ui;font-size:0.85rem">
    <strong>${flag} ${s.name}</strong><br>
    <span style="color:#64748b;font-size:0.75rem">${s.city || s.county || ''} · ${s.source}</span>
    <table style="margin-top:6px;border-collapse:collapse">${priceRows}</table>
  </div>`;
}

function renderSidebar(stations) {
  const list = document.getElementById('stationList');
  document.getElementById('countLabel').textContent = `(${stations.length.toLocaleString()})`;

  if (!stations.length) {
    list.innerHTML = '<p class="empty">No stations match filters.</p>';
    return;
  }

  const visible = stations.slice(0, 200);
  list.innerHTML = visible.map((s, i) => {
    const flag = COUNTRY_FLAGS[s.country] || '';
    const hasCoords = s.lat && s.lon;
    const chips = (s.prices || []).map(p =>
      `<span class="price-chip">
        <span class="type">${p.fuel_type}</span>
        <span class="val">${p.price.toFixed(2)}</span>
        <span class="cur">${p.currency}</span>
      </span>`
    ).join('');
    const pinIcon = hasCoords ? '' : '<span style="color:#475569;font-size:0.65rem;margin-left:4px" title="No map coordinates">📍✕</span>';
    return `<div class="station-card" id="card-${i}" onclick="selectStation(${i})">
      <div class="station-name">${flag} ${s.name}${pinIcon}</div>
      <div class="station-meta">${s.city || s.county || ''} · ${s.source}</div>
      <div class="prices">${chips || '<span style="color:#64748b;font-size:0.75rem">No prices</span>'}</div>
    </div>`;
  }).join('');

  if (stations.length > 200) {
    list.innerHTML += `<p class="empty">Showing 200 of ${stations.length.toLocaleString()} — use filters to narrow down.</p>`;
  }
}

function selectStation(i) {
  const stations = getFilteredStations();
  const s = stations[i];
  if (!s) return;

  if (activeCard) activeCard.classList.remove('active');
  const card = document.getElementById(`card-${i}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ block: 'nearest' });
    activeCard = card;
  }

  const marker = markerMap[i];
  if (marker) {
    map.setView([s.lat, s.lon], Math.max(map.getZoom(), 12));
    marker.openPopup();
  }
}

function resetFilters() {
  document.getElementById('countryFilter').value = '';
  document.getElementById('fuelFilter').value = '';
  render();
}

document.getElementById('countryFilter').addEventListener('change', render);
document.getElementById('fuelFilter').addEventListener('change', render);

loadData();
</script>
</body>
</html>
