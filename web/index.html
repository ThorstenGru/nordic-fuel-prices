<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>European Fuel Prices</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
/* === Reset & Base === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* === Header === */
#header {
  padding: 8px 16px;
  background: #1e293b;
  border-bottom: 1px solid #334155;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  min-height: 46px;
  z-index: 100;
}
#header h1 { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; white-space: nowrap; }
#status {
  font-size: 0.68rem;
  color: #64748b;
  margin-left: auto;
  text-align: right;
  line-height: 1.35;
  max-width: 60%;
}
#status.ok  { color: #22c55e; }
#status.err { color: #ef4444; }
#status.loading { color: #f59e0b; }

/* === Controls bar === */
#controls-bar {
  padding: 8px 16px;
  background: #1e293b;
  border-bottom: 1px solid #334155;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
  align-items: center;
}

.search-group {
  display: flex;
  gap: 4px;
  flex: 1;
  min-width: 180px;
  max-width: 340px;
}
.search-group input {
  flex: 1;
  background: #0f172a;
  color: #e2e8f0;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.85rem;
  min-height: 36px;
}
.search-group input::placeholder { color: #475569; }
.search-group input:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }

select, button {
  background: #0f172a;
  color: #e2e8f0;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.85rem;
  cursor: pointer;
  white-space: nowrap;
  min-height: 36px;
}
button:hover, button:active { background: #1e3a5f; border-color: #3b82f6; }
select:focus, button:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }

.loc-btn { color: #60a5fa; border-color: #1e40af; }
.loc-btn:hover { background: #1e3a5f; }
.loc-btn.loading { opacity: 0.6; cursor: wait; }

/* === Main layout === */
.main { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; min-width: 0; }

/* === Sidebar === */
#sidebar {
  width: 320px;
  flex-shrink: 0;
  background: #1e293b;
  border-left: 1px solid #334155;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid #334155;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#sidebar-header h2 {
  font-size: 0.78rem;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
#stationList {
  padding: 8px;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* === Station cards === */
.station-card {
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 9px 11px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: border-color 0.12s;
}
.station-card:hover  { border-color: #3b82f6; }
.station-card.active { border-color: #3b82f6; background: #1e3a5f; }
.station-name { font-size: 0.88rem; font-weight: 600; color: #f1f5f9; }
.station-meta { font-size: 0.70rem; color: #64748b; margin: 2px 0 5px; }
.prices { display: flex; flex-wrap: wrap; gap: 4px; }
.price-chip {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 5px;
  padding: 2px 7px;
  font-size: 0.72rem;
}
.price-chip .type { color: #94a3b8; }
.price-chip .val  { color: #22c55e; font-weight: 600; margin-left: 3px; }
.price-chip .cur  { color: #64748b; font-size: 0.65rem; margin-left: 2px; }
.empty { color: #64748b; font-size: 0.82rem; padding: 20px 0; text-align: center; }

/* === Map overlays === */
.leaflet-tooltip.price-tip {
  background: rgba(15,23,42,0.92);
  border: 1px solid #334155;
  color: #22c55e;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  white-space: nowrap;
  box-shadow: none;
}
.leaflet-tooltip.price-tip::before { display: none; }
#map.hide-prices .price-tip { display: none; }

.my-loc-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #3b82f6;
  border: 3px solid #fff;
  box-shadow: 0 0 0 4px rgba(59,130,246,0.3);
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0   rgba(59,130,246,0.4); }
  70%  { box-shadow: 0 0 0 10px rgba(59,130,246,0); }
  100% { box-shadow: 0 0 0 0   rgba(59,130,246,0); }
}

/* Cluster icons — dark theme */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
  background: rgba(30,58,95,0.85) !important;
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
  background: rgba(59,130,246,0.8) !important;
  color: #fff !important;
  font-size: 0.7rem !important;
  font-weight: 700 !important;
}

/* === Sheet handle (shown on mobile) === */
.sheet-handle {
  display: none;
  width: 40px; height: 4px;
  background: #475569;
  border-radius: 2px;
  margin: 10px auto 8px;
  flex-shrink: 0;
}

/* === Backdrop === */
#backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 590;
}
#backdrop.visible { display: block; }

/* === Mobile bottom bar (hidden on desktop) === */
#mobile-bar { display: none; }

/* ============================================================
   MOBILE STYLES  (≤ 768px)
   ============================================================ */
@media (max-width: 768px) {

  /* Compact header */
  #header { min-height: 42px; padding: 6px 12px; }
  #header h1 { font-size: 0.85rem; }
  #status { font-size: 0.60rem; }

  /* Controls bar → fixed bottom sheet */
  #controls-bar {
    position: fixed;
    bottom: 62px;
    left: 0; right: 0;
    z-index: 600;
    border-top: 1px solid #334155;
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    padding: 4px 16px 20px;
    flex-direction: column;
    gap: 10px;
    max-height: 75vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateY(calc(100% + 62px));
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
  }
  #controls-bar.sheet-open { transform: translateY(0); }
  #controls-bar .sheet-handle { display: flex; }
  #controls-bar .search-group { max-width: none; }
  /* Prevent iOS zoom on input focus — must be ≥ 16px */
  #controls-bar input,
  #controls-bar select { font-size: 16px; padding: 10px 12px; min-height: 44px; }
  #controls-bar button { min-height: 44px; font-size: 15px; }

  /* Sidebar → fixed bottom sheet */
  #sidebar {
    position: fixed;
    bottom: 62px;
    left: 0; right: 0; top: auto;
    width: 100%;
    max-height: 68vh;
    border-left: none;
    border-top: 1px solid #334155;
    border-radius: 16px 16px 0 0;
    z-index: 601;
    transform: translateY(calc(100% + 62px));
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
    display: flex !important;
  }
  #sidebar.sheet-open { transform: translateY(0); }
  #sidebar .sheet-handle { display: flex; }

  /* Map fills everything; mobile bar is fixed so no padding needed */
  .main { flex: 1; }

  /* Move Leaflet attribution/zoom controls above mobile bar */
  .leaflet-bottom { bottom: 66px; }

  /* Sheet handle visible */
  .sheet-handle { display: flex; }

  /* Mobile bar */
  #mobile-bar {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 62px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: #1e293b;
    border-top: 1px solid #334155;
    z-index: 700;
    align-items: stretch;
    justify-content: space-around;
  }

  /* Mobile bar buttons */
  .mob-btn {
    flex: 1;
    background: none;
    border: none;
    border-right: 1px solid #1e293b;
    color: #94a3b8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 6px 4px;
    cursor: pointer;
    font-size: 0.62rem;
    font-family: inherit;
    transition: color 0.12s, background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .mob-btn:last-child { border-right: none; }
  .mob-btn:active { background: #1e3a5f; }
  .mob-btn.active { color: #3b82f6; }
  .mob-btn .mob-icon { font-size: 1.3rem; line-height: 1; }
  .mob-btn.loc-btn { color: #60a5fa; }
  .mob-btn.loc-btn.loading { opacity: 0.5; }
}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <span style="font-size:1.1rem;flex-shrink:0">⛽</span>
  <h1>European Fuel Prices</h1>
  <span id="status" class="loading">Loading…</span>
</div>

<!-- Controls bar (desktop: always visible; mobile: slide-up sheet) -->
<div id="controls-bar">
  <div class="sheet-handle"></div>
  <div class="search-group">
    <input type="text" id="searchInput" placeholder="Search address or city…"
           autocomplete="off" autocorrect="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')searchAddress()">
    <button onclick="searchAddress()" title="Search">🔍</button>
  </div>
  <button class="loc-btn" onclick="goToMyLocation()" title="My location">📍 My location</button>
  <select id="countryFilter">
    <option value="">All countries</option>
    <option value="AT">🇦🇹 Austria</option>
    <option value="HR">🇭🇷 Croatia</option>
    <option value="DK">🇩🇰 Denmark</option>
    <option value="FI">🇫🇮 Finland</option>
    <option value="FR">🇫🇷 France</option>
    <option value="DE">🇩🇪 Germany</option>
    <option value="IS">🇮🇸 Iceland</option>
    <option value="IT">🇮🇹 Italy</option>
    <option value="NO">🇳🇴 Norway</option>
    <option value="PT">🇵🇹 Portugal</option>
    <option value="RO">🇷🇴 Romania</option>
    <option value="SI">🇸🇮 Slovenia</option>
    <option value="ES">🇪🇸 Spain</option>
    <option value="SE">🇸🇪 Sweden</option>
  </select>
  <select id="fuelFilter">
    <option value="">All fuels</option>
    <option value="E10">E10 / 95</option>
    <option value="E5">E5 / 98</option>
    <option value="DIESEL">Diesel</option>
    <option value="HVO100">HVO100</option>
    <option value="E85">E85</option>
    <option value="LPG">LPG</option>
    <option value="CNG">CNG</option>
  </select>
  <button onclick="resetFilters()">↺ Reset</button>
</div>

<!-- Main: map + sidebar -->
<div class="main">
  <div id="map"></div>
  <div id="sidebar">
    <div class="sheet-handle"></div>
    <div id="sidebar-header">
      <h2>Stations <span id="countLabel"></span></h2>
    </div>
    <div id="stationList"><p class="empty">Loading map data…</p></div>
  </div>
</div>

<!-- Backdrop (closes sheets on tap) -->
<div id="backdrop" onclick="closeAllSheets()"></div>

<!-- Mobile bottom navigation bar -->
<div id="mobile-bar">
  <button class="mob-btn" id="filterBtn" onclick="toggleSheet('controls-bar','filterBtn')">
    <span class="mob-icon">⚡</span>
    <span>Filters</span>
  </button>
  <button class="mob-btn loc-btn" onclick="goToMyLocation()">
    <span class="mob-icon">📍</span>
    <span>Locate</span>
  </button>
  <button class="mob-btn" id="listBtn" onclick="toggleSheet('sidebar','listBtn')">
    <span class="mob-icon">📋</span>
    <span id="mobileCountLabel">List</span>
  </button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ── Map setup ─────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [52, 13], zoom: 5, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19,
}).addTo(map);

// ── Constants ─────────────────────────────────────────────────────────────────
const COUNTRY_FLAGS = {
  AT:'🇦🇹', HR:'🇭🇷', DK:'🇩🇰', FI:'🇫🇮', FR:'🇫🇷',
  DE:'🇩🇪', IS:'🇮🇸', IT:'🇮🇹', NO:'🇳🇴', PT:'🇵🇹',
  RO:'🇷🇴', SI:'🇸🇮', ES:'🇪🇸', SE:'🇸🇪',
};
const CURRENCY_SYMBOL = {
  EUR:'€', SEK:'kr', NOK:'kr', DKK:'kr', ISK:'kr', RON:'lei',
};
const UNIT_LABEL = { L:'/L', kWh:'/kWh', kg:'/kg' };
const PRICE_ZOOM   = 13;
const CLUSTER_ZOOM = 12;

// Country bounding boxes [[sw_lat, sw_lon], [ne_lat, ne_lon]]
// Used to determine which country to load when the viewport moves
const COUNTRY_BOUNDS = {
  AT: L.latLngBounds([46.37, 9.52],  [49.02, 17.16]),
  HR: L.latLngBounds([42.39, 13.49], [46.55, 19.45]),
  DK: L.latLngBounds([54.56, 8.07],  [57.77, 15.19]),
  FI: L.latLngBounds([59.81, 20.55], [70.09, 29.58]),
  FR: L.latLngBounds([41.33, -5.14], [51.09, 9.56]),
  DE: L.latLngBounds([47.27, 5.87],  [55.06, 15.04]),
  IS: L.latLngBounds([63.29, -24.54],[66.56, -13.49]),
  IT: L.latLngBounds([36.49, 6.63],  [47.09, 18.52]),
  NO: L.latLngBounds([57.97, 4.64],  [71.19, 31.15]),
  PT: L.latLngBounds([36.84, -9.52], [42.15, -6.19]),
  RO: L.latLngBounds([43.62, 22.34], [48.26, 29.68]),
  SI: L.latLngBounds([45.42, 13.38], [46.88, 16.61]),
  ES: L.latLngBounds([35.95, -9.32], [43.79, 4.32]),
  SE: L.latLngBounds([55.34, 11.11], [69.06, 24.17]),
};

// ── State ─────────────────────────────────────────────────────────────────────
const countryStations = {};          // cc → station[]
const loadedCountries  = new Set();  // successfully loaded
const loadingCountries = new Set();  // fetch in progress
let   clusterGroup     = null;
let   markerById       = new Map();  // stationId → L.Marker
let   filteredIds      = [];         // ordered station ids currently shown in sidebar
let   activeSid        = null;
let   myLocMarker      = null;
let   myLocCircle      = null;
let   metaFetchedAt    = null;

// Active filter state
let filterCountry = '';
let filterFuel    = '';

// ── Cluster group init ────────────────────────────────────────────────────────
function initCluster() {
  if (clusterGroup) { map.removeLayer(clusterGroup); }
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    disableClusteringAtZoom: CLUSTER_ZOOM,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    chunkedLoading: true,
    iconCreateFunction: cluster => {
      const n  = cluster.getChildCount();
      const sz = n < 50 ? 'small' : n < 200 ? 'medium' : 'large';
      return L.divIcon({
        html: `<div><span>${n}</span></div>`,
        className: `marker-cluster marker-cluster-${sz}`,
        iconSize: [40, 40],
      });
    },
  });
  map.addLayer(clusterGroup);
}
initCluster();

// ── Sheet management (mobile) ─────────────────────────────────────────────────
function toggleSheet(sheetId, btnId) {
  const sheet  = document.getElementById(sheetId);
  const isOpen = sheet.classList.toggle('sheet-open');
  document.getElementById('backdrop').classList.toggle('visible', isOpen);
  if (btnId) {
    document.getElementById(btnId)?.classList.toggle('active', isOpen);
  }
  if (isOpen) {
    const other      = sheetId === 'controls-bar' ? 'sidebar' : 'controls-bar';
    const otherBtnId = other === 'sidebar' ? 'listBtn' : 'filterBtn';
    document.getElementById(other)?.classList.remove('sheet-open');
    document.getElementById(otherBtnId)?.classList.remove('active');
  }
}

function closeAllSheets() {
  ['controls-bar', 'sidebar'].forEach(id =>
    document.getElementById(id).classList.remove('sheet-open'));
  ['filterBtn', 'listBtn'].forEach(id =>
    document.getElementById(id)?.classList.remove('active'));
  document.getElementById('backdrop').classList.remove('visible');
}

map.on('click movestart', () => {
  if (window.innerWidth <= 768) closeAllSheets();
});

// ── Status bar ────────────────────────────────────────────────────────────────
function updateStatus() {
  const el     = document.getElementById('status');
  const loaded = loadedCountries.size;
  const total  = Object.keys(COUNTRY_BOUNDS).length;
  const n      = Object.values(countryStations).reduce((s, a) => s + a.length, 0);
  const active = loadingCountries.size;

  if (active > 0) {
    el.textContent = `${n.toLocaleString()} stations · loading ${active} more…`;
    el.className   = 'loading';
  } else {
    const time = metaFetchedAt
      ? new Date(metaFetchedAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      : '';
    el.textContent = `${n.toLocaleString()} stations · ${loaded}/${total} countries${time ? ' · ' + time : ''}`;
    el.className   = 'ok';
  }
}

// ── Country data loading ──────────────────────────────────────────────────────
async function loadCountry(cc) {
  if (loadedCountries.has(cc) || loadingCountries.has(cc)) return;
  loadingCountries.add(cc);
  updateStatus();

  try {
    const resp = await fetch(`${cc.toLowerCase()}.json`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const stations = data.stations || [];

    if (data.meta?.fetched_at && !metaFetchedAt) {
      metaFetchedAt = data.meta.fetched_at;
    }

    countryStations[cc] = stations;
    loadedCountries.add(cc);

    // Add matching markers to the live cluster group (no full rebuild)
    addCountryToMap(cc, stations);
    appendToSidebar(cc, stations);
    updateStatus();
  } catch (e) {
    console.warn(`[${cc}] load failed: ${e.message}`);
  } finally {
    loadingCountries.delete(cc);
    updateStatus();
  }
}

function matchesFilter(s) {
  if (filterCountry && s.country !== filterCountry) return false;
  if (filterFuel && !s.prices?.some(p => p.fuel_type === filterFuel)) return false;
  return true;
}

function createMarker(s) {
  const color    = confidenceColor(s.confidence);
  const cheapest = cheapestPrice(s);
  const icon     = L.divIcon({
    className: '',
    html: `<div style="width:9px;height:9px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.8);"></div>`,
    iconSize: [9, 9], iconAnchor: [4, 4],
  });
  const marker = L.marker([s.lat, s.lon], { icon });
  marker.bindPopup(buildPopup(s), { maxWidth: 260 });
  if (cheapest) {
    const sym = CURRENCY_SYMBOL[cheapest.currency] || cheapest.currency;
    marker.bindTooltip(
      `${cheapest.fuel_type} ${cheapest.price.toFixed(2)}${sym}`,
      { permanent: true, direction: 'right', className: 'price-tip', offset: [5, 0] }
    );
  }
  marker.on('click', () => highlightStation(s.id));
  return marker;
}

function addCountryToMap(cc, stations) {
  const toAdd = [];
  for (const s of stations) {
    if (!s.lat || !s.lon || !matchesFilter(s)) continue;
    if (markerById.has(s.id)) continue;
    const m = createMarker(s);
    markerById.set(s.id, m);
    toAdd.push(m);
  }
  if (toAdd.length) clusterGroup.addLayers(toAdd);
}

// ── Viewport-based lazy loading ───────────────────────────────────────────────
let _vpTimer = null;
function scheduleViewportCheck() {
  clearTimeout(_vpTimer);
  _vpTimer = setTimeout(checkViewport, 150);
}

function checkViewport() {
  const bounds = map.getBounds();
  const cf     = filterCountry;

  for (const [cc, bbox] of Object.entries(COUNTRY_BOUNDS)) {
    if (loadedCountries.has(cc) || loadingCountries.has(cc)) continue;
    if (cf && cc !== cf) continue;  // country filter active — only load that country
    if (bounds.intersects(bbox)) {
      loadCountry(cc);
    }
  }
}

map.on('moveend zoomend', scheduleViewportCheck);

// ── Full filter rebuild ───────────────────────────────────────────────────────
function applyFilters() {
  clusterGroup.clearLayers();
  markerById.clear();
  filteredIds = [];

  for (const [cc, stations] of Object.entries(countryStations)) {
    addCountryToMap(cc, stations);
  }
  rebuildSidebar();
  updatePriceLabels();

  // If country filter is set and that country hasn't loaded yet, trigger load
  if (filterCountry && !loadedCountries.has(filterCountry)) {
    loadCountry(filterCountry);
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function appendToSidebar(cc, newStations) {
  // Just do a full rebuild — sidebar only shows 200 stations anyway
  rebuildSidebar();
}

function rebuildSidebar() {
  const list  = document.getElementById('stationList');
  const label = document.getElementById('countLabel');

  // Collect all filtered stations from all loaded countries
  const all = [];
  for (const stations of Object.values(countryStations)) {
    for (const s of stations) {
      if (matchesFilter(s)) all.push(s);
    }
  }

  filteredIds = all.map(s => s.id);
  const n = all.length;
  label.textContent = `(${n.toLocaleString()})`;
  document.getElementById('mobileCountLabel').textContent = n.toLocaleString();

  if (!n) {
    list.innerHTML = loadingCountries.size
      ? '<p class="empty">Loading…</p>'
      : '<p class="empty">No stations match current filters.</p>';
    return;
  }

  const visible = all.slice(0, 200);
  list.innerHTML = visible.map(s => stationCard(s)).join('');

  if (n > 200) {
    list.innerHTML +=
      `<p class="empty">Showing 200 of ${n.toLocaleString()} — use filters to narrow.</p>`;
  }
}

function stationCard(s) {
  const flag  = COUNTRY_FLAGS[s.country] || '';
  const sym   = CURRENCY_SYMBOL[s.prices?.[0]?.currency] || '';
  const chips = (s.prices || []).map(p =>
    `<span class="price-chip">
      <span class="type">${p.fuel_type}</span>
      <span class="val">${p.price.toFixed(2)}</span>
      <span class="cur">${sym}</span>
    </span>`
  ).join('');
  const noPin = (s.lat && s.lon) ? '' :
    '<span style="color:#475569;font-size:0.62rem;margin-left:4px" title="No GPS">📍✕</span>';
  const isActive = s.id === activeSid ? ' active' : '';
  return `<div class="station-card${isActive}" id="card-${s.id}" onclick="highlightStation('${s.id}')">
    <div class="station-name">${flag} ${s.name || s.brand || '—'}${noPin}</div>
    <div class="station-meta">${[s.city, s.source].filter(Boolean).join(' · ')}</div>
    <div class="prices">${chips || '<span style="color:#64748b;font-size:0.72rem">No prices</span>'}</div>
  </div>`;
}

// ── Station selection ─────────────────────────────────────────────────────────
function highlightStation(sid) {
  // Update card active state
  if (activeSid) {
    document.getElementById(`card-${activeSid}`)?.classList.remove('active');
  }
  activeSid = sid;
  const card = document.getElementById(`card-${sid}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  const marker = markerById.get(sid);
  if (marker) {
    // Zoom and open popup; handles markers inside clusters
    clusterGroup.zoomToShowLayer(marker, () => marker.openPopup());
    if (window.innerWidth <= 768) closeAllSheets();
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function cheapestPrice(s) {
  if (!s.prices?.length) return null;
  const liquid = s.prices.filter(p => p.unit === 'L' && p.price > 0);
  if (!liquid.length) return s.prices[0];
  return liquid.reduce((a, b) => a.price < b.price ? a : b);
}

function confidenceColor(c) {
  if (c >= 1.0) return '#22c55e';
  if (c >= 0.90) return '#3b82f6';
  if (c >= 0.75) return '#f59e0b';
  return '#ef4444';
}

function buildPopup(s) {
  const flag = COUNTRY_FLAGS[s.country] || '';
  const sym  = CURRENCY_SYMBOL[s.prices?.[0]?.currency] || '';
  const rows = (s.prices || []).map(p =>
    `<tr>
      <td style="color:#94a3b8;padding-right:8px">${p.fuel_type}</td>
      <td style="color:#22c55e;font-weight:700">${p.price.toFixed(2)}</td>
      <td style="color:#64748b;padding-left:2px">${sym}${UNIT_LABEL[p.unit] || ''}</td>
    </tr>`
  ).join('');
  const meta = [s.city, s.brand, s.source].filter(Boolean).join(' · ');
  return `<div style="font-family:system-ui;font-size:0.82rem;min-width:140px">
    <strong style="color:#f1f5f9">${flag} ${s.name || s.brand || ''}</strong>
    ${s.address ? `<div style="color:#64748b;font-size:0.72rem;margin:1px 0">${s.address}</div>` : ''}
    <div style="color:#64748b;font-size:0.70rem;margin-bottom:6px">${meta}</div>
    <table style="border-collapse:collapse">${rows}</table>
  </div>`;
}

// ── Price label visibility ────────────────────────────────────────────────────
function updatePriceLabels() {
  map.getContainer().classList.toggle('hide-prices', map.getZoom() < PRICE_ZOOM);
}
map.on('zoomend', updatePriceLabels);

// ── My Location ───────────────────────────────────────────────────────────────
function goToMyLocation() {
  if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.add('loading'));

  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lon, accuracy } = pos.coords;
      document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('loading'));
      map.setView([lat, lon], 13);
      if (window.innerWidth <= 768) closeAllSheets();

      if (myLocMarker) { map.removeLayer(myLocMarker); map.removeLayer(myLocCircle); }
      myLocMarker = L.marker([lat, lon], {
        icon: L.divIcon({
          className: '',
          html: '<div class="my-loc-dot"></div>',
          iconSize: [14, 14], iconAnchor: [7, 7],
        }),
        zIndexOffset: 1000,
      }).addTo(map).bindPopup('📍 You are here').openPopup();

      myLocCircle = L.circle([lat, lon], {
        radius: Math.min(accuracy, 500),
        color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.08, weight: 1,
      }).addTo(map);
    },
    err => {
      document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('loading'));
      const msgs = { 1: 'Permission denied.', 2: 'Position unavailable.', 3: 'Timed out.' };
      alert('Location error: ' + (msgs[err.code] || err.message));
    },
    { timeout: 10000, maximumAge: 60000 }
  );
}

// ── Address search ─────────────────────────────────────────────────────────────
async function searchAddress() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  try {
    const url  = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`;
    const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await resp.json();
    if (!data.length) { alert(`"${q}" not found.`); return; }
    const { lat, lon, display_name } = data[0];
    map.setView([parseFloat(lat), parseFloat(lon)], 13);
    if (window.innerWidth <= 768) closeAllSheets();
    L.popup()
      .setLatLng([parseFloat(lat), parseFloat(lon)])
      .setContent(`<div style="font-size:0.82rem;max-width:220px">${display_name}</div>`)
      .openOn(map);
  } catch (e) {
    alert('Search error: ' + e.message);
  }
}

// ── Filter controls ───────────────────────────────────────────────────────────
function resetFilters() {
  document.getElementById('countryFilter').value = '';
  document.getElementById('fuelFilter').value = '';
  document.getElementById('searchInput').value = '';
  filterCountry = '';
  filterFuel    = '';
  applyFilters();
}

document.getElementById('countryFilter').addEventListener('change', e => {
  filterCountry = e.target.value;
  applyFilters();
  scheduleViewportCheck();
});

document.getElementById('fuelFilter').addEventListener('change', e => {
  filterFuel = e.target.value;
  applyFilters();
});

// ── Boot: load meta then trigger initial viewport check ───────────────────────
(async () => {
  const status = document.getElementById('status');
  try {
    // Fetch lightweight meta.json first to get timestamps and country list
    const resp = await fetch('meta.json');
    if (resp.ok) {
      const meta = await resp.json();
      metaFetchedAt = meta.fetched_at;
    }
  } catch (_) { /* meta.json may not exist yet on first deploy */ }

  // Trigger initial load of countries visible in the starting viewport
  updateStatus();
  updatePriceLabels();
  scheduleViewportCheck();
})();
</script>
